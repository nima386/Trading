<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1025"/>
      <stop offset="100%" stop-color="#06060B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="50%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Ambient glow -->
  <circle cx="256" cy="230" r="100" fill="url(#glow)" opacity="0.1" filter="url(#glow1)"/>
  <!-- Brain — Left hemisphere -->
  <g fill="none" stroke="url(#glow)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M188 268c-36-5-64-36-64-74 0-42 32-74 74-74 10 0 20 2 30 6"/>
    <path d="M158 274c-26 4-48-12-48-38s16-42 38-48"/>
    <path d="M178 300c-22 0-42-16-42-38 0-16 10-30 26-36"/>
    <!-- Right hemisphere -->
    <path d="M324 268c36-5 64-36 64-74 0-42-32-74-74-74-10 0-20 2-30 6"/>
    <path d="M354 274c26 4 48-12 48-38s-16-42-38-48"/>
    <path d="M334 300c22 0 42-16 42-38 0-16-10-30-26-36"/>
    <!-- Center -->
    <path d="M256 120v190"/>
  </g>
  <!-- Neural network nodes -->
  <circle cx="256" cy="175" r="11" fill="url(#glow)" stroke="none"/>
  <circle cx="256" cy="175" r="18" fill="none" stroke="url(#glow)" stroke-width="1" opacity="0.3"/>
  <circle cx="220" cy="218" r="8" fill="#8B5CF6"/>
  <circle cx="292" cy="218" r="8" fill="#EC4899"/>
  <circle cx="236" cy="258" r="7" fill="#06B6D4"/>
  <circle cx="276" cy="258" r="7" fill="#10B981"/>
  <circle cx="256" cy="290" r="9" fill="url(#cyan)"/>
  <circle cx="200" cy="252" r="5" fill="#F97316" opacity="0.7"/>
  <circle cx="312" cy="252" r="5" fill="#EAB308" opacity="0.7"/>
  <!-- Neural connections -->
  <g stroke="url(#glow)" stroke-width="2" opacity="0.35" stroke-linecap="round">
    <line x1="256" y1="175" x2="220" y2="218"/>
    <line x1="256" y1="175" x2="292" y2="218"/>
    <line x1="220" y1="218" x2="236" y2="258"/>
    <line x1="292" y1="218" x2="276" y2="258"/>
    <line x1="220" y1="218" x2="200" y2="252"/>
    <line x1="292" y1="218" x2="312" y2="252"/>
    <line x1="236" y1="258" x2="256" y2="290"/>
    <line x1="276" y1="258" x2="256" y2="290"/>
    <line x1="200" y1="252" x2="236" y2="258"/>
    <line x1="312" y1="252" x2="276" y2="258"/>
  </g>
  <!-- Pulse wave bottom -->
  <polyline points="100,390 150,390 180,358 210,420 240,374 270,404 300,390 330,370 360,400 412,390"
    fill="none" stroke="url(#glow)" stroke-width="5" stroke-linecap="round" opacity="0.6"/>
  <!-- Decorative outer dots -->
  <circle cx="120" cy="160" r="4" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="392" cy="160" r="4" fill="#EC4899" opacity="0.3"/>
  <circle cx="130" cy="320" r="3" fill="#06B6D4" opacity="0.25"/>
  <circle cx="382" cy="320" r="3" fill="#10B981" opacity="0.25"/>
  <circle cx="160" cy="130" r="2.5" fill="#F97316" opacity="0.2"/>
  <circle cx="352" cy="130" r="2.5" fill="#EAB308" opacity="0.2"/>
</svg>
